package:
  name: hydrogen
  description: "PureScript/Halogen web framework - type-safe routing, API clients,
    SSG, UI primitives"
  publish:
    version: 0.1.0
    license: MIT
    location:
      githubOwner: straylight-software
      githubRepo: hydrogen
  dependencies:
    # Core
    - aff
    # HTTP
    - affjax
    - affjax-web
    - argonaut
    - argonaut-codecs
    - argonaut-core
    - arraybuffer-types
    - arrays
    - bifunctors
    - console
    - control
    - datetime
    - effect
    - either
    - enums
    - exceptions
    - foldable-traversable
    - foreign
    - foreign-object
    # Halogen
    - halogen
    - halogen-vdom
    - http-methods
    - integers
    - lists
    - maybe
    - media-types
    - newtype
    - now
    - numbers
    - ordered-collections
    - prelude
    - refs
    - strings
    - tuples
    # Type-level programming
    - type-equality
    - typelevel-prelude
    - typelevel-lists
    # Web APIs
    - web-dom
    - web-events
    - web-html
    - web-uievents
    # FFI support
    - aff-promise
    - nullable
  test:
    main: Test.Main
    dependencies:
      - gen
      - quickcheck
      - spec
      - spec-quickcheck

workspace:
  packageSet:
    registry: 73.2.0
